<svg xmlns="http://www.w3.org/2000/svg" width="800" height="100" viewBox="0 0 800 100">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="acc5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <filter id="g5">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="100" fill="url(#bg5)"/>

  <rect x="200" y="0" width="400" height="1" fill="url(#acc5)" opacity="0.2"/>

  <text x="400" y="35" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle" font-style="italic">The engineer who knows how to direct AI will outbuild any team.</text>

  <rect x="365" y="52" width="70" height="1" fill="#00d4aa" opacity="0.25"/>

  <text x="400" y="78" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#00d4aa" text-anchor="middle" letter-spacing="2.5" filter="url(#g5)">SPEC · BUILD · TEST · FIX · SHIP</text>

  <rect x="0" y="98" width="800" height="2" fill="url(#acc5)" opacity="0.1"/>
</svg>
