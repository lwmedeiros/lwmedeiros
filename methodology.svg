<svg xmlns="http://www.w3.org/2000/svg" width="800" height="270" viewBox="0 0 800 270">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="800" height="270" fill="url(#bg2)"/>

  <!-- Section label -->
  <rect x="35" y="18" width="3" height="16" fill="#00d4aa" rx="1"/>
  <text x="48" y="31" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#00d4aa" letter-spacing="2.5" font-weight="600">HOW EVERY PROJECT IS BUILT</text>
  <line x1="320" y1="25" x2="765" y2="25" stroke="#1a2332" stroke-width="1"/>

  <!-- Left: What I do -->
  <g transform="translate(35,50)">
    <rect width="355" height="190" rx="7" fill="#0d1117" stroke="#1a2332"/>
    <rect width="355" height="3" rx="1" fill="#00d4aa" opacity="0.5"/>

    <text x="18" y="28" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#00d4aa" font-weight="600" letter-spacing="1.5">MY JOB — THE ENGINEER</text>

    <circle cx="28" cy="55" r="3" fill="#00d4aa" opacity="0.5"/>
    <text x="40" y="59" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Define what the system must do and why</text>

    <circle cx="28" cy="80" r="3" fill="#00d4aa" opacity="0.5"/>
    <text x="40" y="84" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Set architecture, security rules, constraints</text>

    <circle cx="28" cy="105" r="3" fill="#00d4aa" opacity="0.5"/>
    <text x="40" y="109" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Order the AI to implement exactly that</text>

    <circle cx="28" cy="130" r="3" fill="#00d4aa" opacity="0.5"/>
    <text x="40" y="134" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Test the output — try to break it</text>

    <circle cx="28" cy="155" r="3" fill="#00d4aa" opacity="0.5"/>
    <text x="40" y="159" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Fix what's broken, reject what's wrong</text>

    <line x1="18" y1="172" x2="337" y2="172" stroke="#1a2332"/>
    <text x="18" y="187" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6e7681" font-style="italic">I don't ask — I direct. The README shows everything.</text>
  </g>

  <!-- Right: What AI does -->
  <g transform="translate(410,50)">
    <rect width="355" height="190" rx="7" fill="#0d1117" stroke="#1a2332"/>
    <rect width="355" height="3" rx="1" fill="#00b4d8" opacity="0.5"/>

    <text x="18" y="28" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#00b4d8" font-weight="600" letter-spacing="1.5">AI'S JOB — THE TOOL</text>

    <circle cx="28" cy="55" r="3" fill="#00b4d8" opacity="0.5"/>
    <text x="40" y="59" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Write code based on my specs — nothing more</text>

    <circle cx="28" cy="80" r="3" fill="#00b4d8" opacity="0.5"/>
    <text x="40" y="84" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Generate tests and documentation</text>

    <circle cx="28" cy="105" r="3" fill="#00b4d8" opacity="0.5"/>
    <text x="40" y="109" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Redo when I reject — no questions asked</text>

    <circle cx="28" cy="130" r="3" fill="#00b4d8" opacity="0.5"/>
    <text x="40" y="134" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Flag its own limitations honestly</text>

    <circle cx="28" cy="155" r="3" fill="#00b4d8" opacity="0.5"/>
    <text x="40" y="159" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Execute — never decide</text>

    <line x1="18" y1="172" x2="337" y2="172" stroke="#1a2332"/>
    <text x="18" y="187" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6e7681" font-style="italic">Powerful, but it follows orders.</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="262" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#30363d" text-anchor="middle">Every README: my decisions, my test results, what failed, what shipped.</text>
</svg>
