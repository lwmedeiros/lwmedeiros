<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="50%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="240" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.025" stroke="#00d4aa" stroke-width="0.5">
    <line x1="50" y1="0" x2="50" y2="240"/><line x1="100" y1="0" x2="100" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="240"/><line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="250" y1="0" x2="250" y2="240"/><line x1="300" y1="0" x2="300" y2="240"/>
    <line x1="350" y1="0" x2="350" y2="240"/><line x1="400" y1="0" x2="400" y2="240"/>
    <line x1="450" y1="0" x2="450" y2="240"/><line x1="500" y1="0" x2="500" y2="240"/>
    <line x1="550" y1="0" x2="550" y2="240"/><line x1="600" y1="0" x2="600" y2="240"/>
    <line x1="650" y1="0" x2="650" y2="240"/><line x1="700" y1="0" x2="700" y2="240"/>
    <line x1="750" y1="0" x2="750" y2="240"/>
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
  </g>

  <!-- Scan line -->
  <rect width="800" height="1" fill="url(#accent)" opacity="0.1" y="0">
    <animate attributeName="y" from="-1" to="241" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Circuit traces -->
  <g opacity="0.06" stroke="#00d4aa" stroke-width="1" fill="none">
    <path d="M 0 55 H 45 V 28 H 100"/>
    <path d="M 800 185 H 755 V 210 H 700"/>
    <circle cx="100" cy="28" r="2.5" fill="#00d4aa"/>
    <circle cx="700" cy="210" r="2.5" fill="#00d4aa"/>
  </g>

  <!-- Top accent -->
  <rect x="50" y="0" width="150" height="2" fill="url(#accent)" opacity="0.5"/>

  <!-- Name -->
  <text x="50" y="65" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="36" font-weight="700" fill="#e6edf3" letter-spacing="-1">Lucas W. Medeiros</text>

  <!-- Role -->
  <text x="50" y="97" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#00d4aa" letter-spacing="3.5" filter="url(#glow)">AI SOFTWARE ENGINEER</text>

  <rect x="50" y="112" width="80" height="1" fill="#00d4aa" opacity="0.3"/>

  <!-- Tagline — honest, no fluff -->
  <text x="50" y="138" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e">I spec the system.  AI builds it.  I test it, break it, and fix what's wrong.</text>

  <!-- Compact pillars -->
  <g transform="translate(50,160)">
    <rect width="200" height="46" rx="5" fill="#0d1117" stroke="#1a2332"/>
    <rect width="2.5" height="46" rx="1" fill="#00d4aa"/>
    <text x="14" y="19" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#00d4aa" font-weight="600" letter-spacing="1.5">01 SPEC</text>
    <text x="14" y="35" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6e7681">Architecture · Decisions · Rules</text>

    <text x="212" y="28" font-size="14" fill="#30363d" font-family="'Segoe UI',Helvetica,Arial,sans-serif">→</text>

    <rect x="230" width="200" height="46" rx="5" fill="#0d1117" stroke="#1a2332"/>
    <rect x="230" width="2.5" height="46" rx="1" fill="#00b4d8"/>
    <text x="244" y="19" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#00b4d8" font-weight="600" letter-spacing="1.5">02 AI BUILDS</text>
    <text x="244" y="35" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6e7681">Code · Tests · Docs</text>

    <text x="442" y="28" font-size="14" fill="#30363d" font-family="'Segoe UI',Helvetica,Arial,sans-serif">→</text>

    <rect x="460" width="200" height="46" rx="5" fill="#0d1117" stroke="#1a2332"/>
    <rect x="460" width="2.5" height="46" rx="1" fill="#0077b6"/>
    <text x="474" y="19" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#0077b6" font-weight="600" letter-spacing="1.5">03 TEST + FIX</text>
    <text x="474" y="35" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6e7681">Break it · Find flaws · Ship</text>
  </g>

  <!-- Bottom line -->
  <rect x="50" y="236" width="700" height="2" fill="url(#accent)" opacity="0.15"/>
</svg>
