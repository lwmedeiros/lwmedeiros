<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="50%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="420" y1="0" x2="420" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="660" y1="0" x2="660" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="780" y1="0" x2="780" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="320" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="900" y2="60" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#00d4aa" stroke-width="0.5"/>
  </g>

  <!-- Animated scan line -->
  <rect width="900" height="2" fill="url(#accent)" opacity="0.15" y="0">
    <animate attributeName="y" from="-2" to="322" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative circuit lines -->
  <g opacity="0.08" stroke="#00d4aa" stroke-width="1" fill="none">
    <path d="M 0 80 H 80 V 40 H 160"/>
    <path d="M 900 240 H 820 V 280 H 740"/>
    <path d="M 0 260 H 40 V 200 H 100"/>
    <path d="M 900 60 H 860 V 120 H 800"/>
    <!-- Nodes -->
    <circle cx="160" cy="40" r="3" fill="#00d4aa"/>
    <circle cx="740" cy="280" r="3" fill="#00d4aa"/>
    <circle cx="100" cy="200" r="3" fill="#00d4aa"/>
    <circle cx="800" cy="120" r="3" fill="#00d4aa"/>
  </g>

  <!-- Top accent line -->
  <rect x="60" y="0" width="200" height="2" fill="url(#accent)" opacity="0.6">
    <animate attributeName="width" values="0;200" dur="1.5s" fill="freeze"/>
  </rect>

  <!-- Name -->
  <text x="60" y="85" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#e6edf3" letter-spacing="-1">
    Lucas W. Medeiros
  </text>

  <!-- Role with accent -->
  <text x="60" y="125" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#00d4aa" letter-spacing="4" filter="url(#glow)">
    AI SOFTWARE ENGINEER
  </text>

  <!-- Divider -->
  <rect x="60" y="145" width="120" height="1" fill="#00d4aa" opacity="0.4"/>

  <!-- Philosophy -->
  <text x="60" y="180" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#8b949e">
    I architect the solution.  AI writes the code.  I validate every line.
  </text>

  <!-- Three pillars -->
  <g transform="translate(60, 210)">
    <!-- Pillar 1 -->
    <rect x="0" y="0" width="220" height="70" rx="6" fill="#0d1117" stroke="#1a2332" stroke-width="1"/>
    <rect x="0" y="0" width="3" height="70" rx="1" fill="#00d4aa"/>
    <text x="18" y="25" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#00d4aa" font-weight="600" letter-spacing="2">01 ENGINEER</text>
    <text x="18" y="48" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#8b949e">Architecture · Security · Design</text>

    <!-- Arrow -->
    <text x="235" y="40" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#30363d">→</text>

    <!-- Pillar 2 -->
    <rect x="260" y="0" width="220" height="70" rx="6" fill="#0d1117" stroke="#1a2332" stroke-width="1"/>
    <rect x="260" y="0" width="3" height="70" rx="1" fill="#00b4d8"/>
    <text x="278" y="25" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#00b4d8" font-weight="600" letter-spacing="2">02 AI EXECUTE</text>
    <text x="278" y="48" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#8b949e">Code Generation · Implementation</text>

    <!-- Arrow -->
    <text x="495" y="40" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#30363d">→</text>

    <!-- Pillar 3 -->
    <rect x="520" y="0" width="220" height="70" rx="6" fill="#0d1117" stroke="#1a2332" stroke-width="1"/>
    <rect x="520" y="0" width="3" height="70" rx="1" fill="#0077b6"/>
    <text x="538" y="25" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#0077b6" font-weight="600" letter-spacing="2">03 VALIDATE</text>
    <text x="538" y="48" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#8b949e">Review · Security · Quality Gate</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="60" y="310" width="780" height="2" fill="url(#accent)" opacity="0.2"/>

  <!-- Pulsing dot -->
  <circle cx="850" cy="30" r="4" fill="#00d4aa" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="830" y="50" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" fill="#30363d" text-anchor="middle">LIVE</text>
</svg>
